version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: soc_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - ML_SERVICE_URL=http://ml_service:5001
      - FRONTEND_ORIGIN=http://localhost:5173
      - JWT_SECRET=soc-dashboard-demo-secret
      - DATABASE_URL=postgres://postgres:password@db:5432/soc_dashboard
      - VIRUSTOTAL_API_KEY=
      - GOOGLE_SAFE_BROWSING_API_KEY=
      - ABUSEIPDB_API_KEY=
      - NVD_API_KEY=
    depends_on:
      db:
        condition: service_healthy
      ml_service:
        condition: service_started

  ml_service:
    build:
      context: ./ml_service
    ports:
      - "5001:5001"

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"

volumes:
  postgres_data:
